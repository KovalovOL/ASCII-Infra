events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name tviy-domen.com www.tviy-domen.com; # ЗАМІНИ НА СВІЙ ДОМЕН

        # Спеціальний location для перевірки Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Всі інші HTTP запити редиректимо на HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }
}