events {
    worker_connections 1024;
}

http {
    # Блок для порту 80 (залишаємо як було)
    server {
        listen 80;
        server_name tviy-domen.com www.tviy-domen.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # НОВИЙ БЛОК ДЛЯ HTTPS
    server {
        listen 443 ssl;
        server_name tviy-domen.com www.tviy-domen.com;

        # Шляхи до сертифікатів (зверни увагу, шлях всередині контейнера)
        ssl_certificate /etc/letsencrypt/live/tviy-domen.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tviy-domen.com/privkey.pem;

        # Базові налаштування безпеки SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Твої існуючі налаштування для фронта
        location / {
            proxy_pass http://frontend:3000; # або порт твого фронта
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Твої існуючі налаштування для бека
        location /api/ {
            proxy_pass http://backend:8080; # або порт твого го-бека
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}